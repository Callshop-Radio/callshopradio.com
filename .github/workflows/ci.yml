name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint • typecheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Run biome with --write so auto-fixable lint/format issues are applied,
      # then fail if anything actually changed. This forces contributors to
      # run `pnpm format` locally instead of letting drift accumulate in main.
      - name: Biome (apply fixes, fail on drift)
        run: pnpm format
      - name: Ensure formatter produced no changes
        run: git diff --exit-code
      - name: Typecheck (advisory)
        continue-on-error: true
        run: pnpm typecheck

  build-web:
    name: build (web)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm web:build
        env:
          NUXT_SANITY_PROJECT_ID: ci-placeholder
          NUXT_SANITY_DATASET: production

  build-studio:
    name: build (studio)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm studio:build
        env:
          SANITY_STUDIO_PROJECT_ID: ci-placeholder
