[build]
  base = "web/"
  # With NITRO_PRESET=netlify, Nitro writes static assets to dist/ (not .output/public/).
  publish = "dist"
  command = "pnpm run build"
 
 [build.environment]
   # Sanity-Variablen (NUXT_SANITY_PROJECT_ID, NUXT_SANITY_DATASET) beim Build setzen,
   # damit /pool/*, /shows/*, /words/* mit echten Daten geprerendert werden (sonst 404 → Redirect)
   NODE_OPTIONS = "--max-old-space-size=8192"
   NPM_FLAGS = "--legacy-peer-deps"
  NITRO_PRESET = "netlify"

# Netlify Functions für SSR
[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"
  included_files = [".netlify/functions-internal/**"]

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static Assets - Immutable Cache
[[headers]]
  for = "/*.js"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Sitemap - 1 hour cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    cache-control = "public, max-age=3600"

# Static Content Pages - revalidate on deploy
[[headers]]
  for = "/pool/*"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/shows/*"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/words/*"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

# API Routes - No cache
[[headers]]
  for = "/api/*"
  [headers.values]
    cache-control = "no-cache, no-store, must-revalidate"

# SEO Redirects
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# API Proxy – Netlify Function fuer LibreTime etc.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200