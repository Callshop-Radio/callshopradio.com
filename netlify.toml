[build]
  base = "web/"
  publish = ".output/public"
  command = "NODE_OPTIONS='--max-old-space-size=6144' pnpm run build"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# Netlify Functions für SSR
[functions]
  directory = ".output/server"
  node_bundler = "esbuild"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static Assets - Immutable Cache
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemap - 1 hour cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Dynamic Pages - SWR Headers
[[headers]]
  for = "/pool/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/shows/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/words/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

# API Routes - No cache
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# SEO Redirects
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301