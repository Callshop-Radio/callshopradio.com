[build]
  base = "web/"
  publish = "dist"
  command = "pnpm run build"
 
 [build.environment]
   # Increase Node heap to avoid OOM during Nitro server build (2884 prerendered routes)
   NODE_OPTIONS = "--max-old-space-size=4096"
   NPM_FLAGS = "--legacy-peer-deps"
  NITRO_PRESET = "netlify"

# Netlify Functions für SSR
[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"
  included_files = [".netlify/functions-internal/**"]

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static Assets - Immutable Cache
[[headers]]
  for = "/*.js"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Sitemap - 1 hour cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    cache-control = "public, max-age=3600"

# Dynamic Pages - SWR Headers
[[headers]]
  for = "/pool/*"
  [headers.values]
    cache-control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/shows/*"
  [headers.values]
    cache-control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/words/*"
  [headers.values]
    cache-control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=604800"

# API Routes - No cache
[[headers]]
  for = "/api/*"
  [headers.values]
    cache-control = "no-cache, no-store, must-revalidate"

# SEO Redirects
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# SSR Fallback - Route alle Anfragen an Nitro Server
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200