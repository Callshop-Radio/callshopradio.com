[build]
  base = "web/"
  publish = "dist"
  command = "pnpm run build"
  
# Build-Environment für bessere Performance
[build.environment]
  NODE_VERSION = "18"
  PNPM_VERSION = "8"

# Redirect alle 404-Fehler zur index.html für Client-Side Routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Spezifische Redirects für API-Routen (falls vorhanden)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Headers für bessere Performance und Sicherheit
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"