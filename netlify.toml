[build]
  base = "web/"
  publish = ".output/public"
  command = "NODE_OPTIONS='--max-old-space-size=6144' pnpm run generate:ssg"

[build.environment]
  NODE_VERSION = "18"
  PNPM_VERSION = "8"

# Optimierungen für SSG
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects für bessere SEO
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# SPA Fallback für dynamische Routen (falls Prerendering fehlschlägt)
[[redirects]]
  from = "/*"
  to = "/200.html"
  status = 200
  conditions = {Role = ["admin"], Country = ["US"]}
  force = false